<div class="dashboard-column">
  <div class="column-header">
    <h2 class="text-lg font-medium">Categories</h2>
    <div>
      <button
        id="newCategoryBtn"
        class="text-sm bg-blue-600 text-white px-2 py-1 rounded"
      >
        + New Category
      </button>
    </div>
  </div>
  <div class="column-body">
    <div class="search-box">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4 search-icon"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>
      <input
        type="text"
        id="categorySearchInput"
        placeholder="Search categories..."
        class="w-full border-gray-300 rounded-md"
      />
      <div id="clearCategorySearch" class="clear-search hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </div>
    </div>
    <div id="categoriesContainer" class="categories-container">
      <!-- Category tiles will be populated here -->
      <div class="text-gray-500 text-center py-4">Loading categories...</div>
    </div>
  </div>
</div>
